name: SMC Gold Bot

on:
  schedule:
    - cron: '*/15 7-10 * * 1-5'
    - cron: '*/15 13-16 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SMC Bot
        run: python bot.py
